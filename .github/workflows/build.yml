name: "Build YASK Secret Edition"

env:
  OUT_DIR: "out"
  KERNEL_VERSION: "5.15"
  ANDROID_VERSION: "13"

on:
  workflow_dispatch:
        
jobs:
  build-kernels:
    name: "🚀 Сборка ${{ matrix.kernel.name }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        kernel:
          - name: "GKI-KSU" # Стандарт от Google
            dir: "common_gki"
            repo_name: "common"
            repo_url: "https://android.googlesource.com/kernel/common"
            branch: "android13-5.15-lts"
            defconfig: "gki_defconfig"
            local_version: "-YASK-GKI-SECRET"
            output_name: "Image.gki.ksu"
          - name: "CLO-KSU" # Оптимизация от Qualcomm
            dir: "common_clo"
            repo_name: "clo"
            repo_url: "https://git.codelinaro.org/clo/la/kernel/msm-5.15.git"
            branch: "kernel.lnx.5.15.r1-rel"
            defconfig: "gki_defconfig"
            local_version: "-YASK-CLO-SECRET"
            output_name: "Image.clo.ksu"

    env:
      KERNEL_LOC_DIR: ${{ matrix.kernel.dir }}
      KERNEL_NAME: ${{ matrix.kernel.repo_name }}
      KERNEL_REPO: ${{ matrix.kernel.repo_url }}
      KERNEL_BRANCH: ${{ matrix.kernel.branch }}
      DEFCONFIG_NAME: ${{ matrix.kernel.defconfig }}
      LOCAL_VERSION: ${{ matrix.kernel.local_version }}
      OUTPUT_NAME: ${{ matrix.kernel.output_name }}
      WORK_DIR: ${{ github.workspace }}

    steps:
      - name: "✨ Setup"
        run: |
          mkdir -p ${{ env.KERNEL_LOC_DIR }}
          sudo apt-get update -qq
          sudo apt-get install -y repo rsync aria2 git zip dwarves libelf-dev gcc-aarch64-linux-gnu libssl-dev python3 clang lld llvm llvm-dev

      - name: "🌟 Clone"
        working-directory: ./${{ env.KERNEL_LOC_DIR }}
        run: |
          git clone --recursive --branch ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_REPO }} ${{ env.KERNEL_NAME }} --depth=1

      - name: "🧬 ХИРУРГИЯ (ПАМЯТЬ + СЕРИЙНИК)"
        working-directory: ./${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}
        run: |
          # Подмена Памяти
          sed -i 's/show_val_kb(m, "MemTotal:       ", i.totalram);/seq_printf(m, "MemTotal:       7783999 kB\\n");/g' fs/proc/meminfo.c
          
          # Подмена Серийника (5A3B8C2D)
          python3 -c "
          import os
          path = 'drivers/soc/qcom/socinfo.c'
          if os.path.exists(path):
              with open(path, 'r') as f:
                  data = f.read()
              target = 'return socinfo ? le32_to_cpu(socinfo->serial_num) : 0;'
              if target in data:
                  data = data.replace(target, 'return 0x5A3B8C2D;')
                  with open(path, 'w') as f:
                      f.write(data)
          "
          # Подмена USB Серийника
          sed -i 's/copy_to_user(un->serial_number, serial, len)/copy_to_user(un->serial_number, "5A3B8C2D", 9)/g' drivers/usb/gadget/composite.c || echo "Skip USB"

      - name: "📥 Toolchains"
        working-directory: ${{ env.WORK_DIR }}
        run: |
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android13-5.15-lts --depth=1
          repo sync --optimized-fetch --prune -j$(nproc --all)
          aria2c -x 16 -s 16 -o prebuilts/clang/host/linux-x86/clang-r547379.tar.gz "https://github.com/topnotchfreaks/clang/releases/download/v1.0.0/clang-r547379.tar.gz"
          mkdir -p prebuilts/clang/host/linux-x86/clang-r547379
          tar -xzf prebuilts/clang/host/linux-x86/clang-r547379.tar.gz -C prebuilts/clang/host/linux-x86/clang-r547379
          sed -i 's/^CLANG_VERSION=.*/CLANG_VERSION=r547379/' ${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}/build.config.constants

      - name: "🔧 KSU & SUSFS"
        working-directory: ${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}
        run: |
          curl -LSs "https://raw.githubusercontent.com/WildKernels/Wild_KSU/wild/kernel/setup.sh" | bash -s canary
          echo "CONFIG_KSU=y" >> arch/arm64/configs/${{ env.DEFCONFIG_NAME }}
          echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/${{ env.DEFCONFIG_NAME }}

      - name: "🔨 Build"
        run: |
          LTO=thin BUILD_CONFIG=${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}/build.config.gki.aarch64 build/build.sh -j$(nproc --all)

      - name: "📤 Upload"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.kernel.name }}-Image
          path: out/dist/Image
