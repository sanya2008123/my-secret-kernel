name: "Build YASK GKI (Serial Spoof)"

env:
  OUT_DIR: "out"
  KERNEL_VERSION: "5.15"
  ANDROID_VERSION: "13"

on:
  workflow_dispatch:

jobs:
  build-kernel:
    name: "🐎 Build YASK GKI kernel"
    runs-on: ubuntu-latest

    env:
      KERNEL_LOC_DIR: "common_gki"
      KERNEL_NAME: "common"
      KERNEL_REPO: "https://android.googlesource.com/kernel/common"
      KERNEL_BRANCH: "android13-5.15-lts"
      DEFCONFIG_NAME: "gki_defconfig"
      LOCAL_VERSION: "-YASK-GKI"
      OUTPUT_NAME: "Image.gki.ksu"
      WORK_DIR: ${{ github.workspace }}

    steps:
      - name: "✨ Setup workspace"
        run: |
          mkdir -p ${{ env.KERNEL_LOC_DIR }}
          echo "BUILD_TIME=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          sudo apt-get update -qq
          sudo apt-get install -y repo rsync aria2

      - name: "📐 Setup SWAP 10GB"
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: "📐 Tune Swap"
        run: |
          echo "vm.swappiness=80" | sudo tee -a /etc/sysctl.conf
          sudo sysctl -p

      - name: "🌟 Clone kernel source"
        working-directory: ./${{ env.KERNEL_LOC_DIR }}
        run: |
          git clone --recursive --branch ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_REPO }} ${{ env.KERNEL_NAME }} --depth=1

      - name: "🧬 SERIAL NUMBER SPOOF (a7c2e91b)"
        working-directory: ./${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}
        run: |
          echo "🔧 Patching serial to a7c2e91b"
          python3 << 'PYEOF'
          import os
          with open('init/main.c', 'r') as f: content = f.read()
          spoof = r'''
          /* SERIAL SPOOF - Force custom serial */
          static int __init fixup_serial(void)
          {
              char *p;
              p = strstr(boot_command_line, "androidboot.serialno=");
              if (p) memcpy(p + 21, "a7c2e91b", 8);
              p = strstr(saved_command_line, "androidboot.serialno=");
              if (p) memcpy(p + 21, "a7c2e91b", 8);
              extern char *common_boot_config;
              if (common_boot_config) {
                  p = strstr(common_boot_config, "androidboot.serialno");
                  if (p) {
                      p = strstr(p, "\"");
                      if (p) memcpy(p + 1, "a7c2e91b", 8);
                  }
              }
              return 0;
          }
          early_initcall(fixup_serial);
          '''
          content = content.replace('static char *common_boot_config;', 'char *common_boot_config;')
          with open('init/main.c', 'w') as f: f.write(content + '\n' + spoof)
          PYEOF
          if [ -f "drivers/soc/qcom/socinfo.c" ]; then
            sed -i 's/le32_to_cpu(socinfo->serial_num)/0xa7c2e91b/g' drivers/soc/qcom/socinfo.c
          fi
          if [ -f "drivers/usb/gadget/composite.c" ]; then
            sed -i 's/copy_to_user(un->serial_number, serial, len)/copy_to_user(un->serial_number, "a7c2e91b", 9)/g' drivers/usb/gadget/composite.c
          fi
          echo "✅ Serial spoof applied"

      - name: "📥 Initialize AOSP repo and toolchains"
        working-directory: ${{ env.WORK_DIR }}
        run: |
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android13-5.15-lts --depth=1
          repo sync --optimized-fetch --prune -j8
          rm -rf .repo
          rm -rf common
          aria2c -x 16 -s 16 -o prebuilts/clang/host/linux-x86/clang-r547379.tar.gz "https://github.com/topnotchfreaks/clang/releases/download/v1.0.0/clang-r547379.tar.gz"
          mkdir -p prebuilts/clang/host/linux-x86/clang-r547379
          tar -xzf prebuilts/clang/host/linux-x86/clang-r547379.tar.gz -C prebuilts/clang/host/linux-x86/clang-r547379
          rm -rf prebuilts/clang/host/linux-x86/clang-r547379.tar.gz
          rm -rf prebuilts/clang/host/linux-x86/clang-3289846
          rm -rf prebuilts/clang/host/linux-x86/clang-r450784e
          rm -rf prebuilts/clang/host/linux-x86/clang-stable
          sed -i -e 's/^BRANCH=.*/BRANCH=android13-5.15/' -e 's/^CLANG_VERSION=.*/CLANG_VERSION=r547379/' ${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}/build.config.constants
          sed -i '/^POST_DEFCONFIG_CMDS="check_defconfig"/d' ${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}/build.config.gki || true

      - name: "🧩 Configure kernel & patches"
        working-directory: ${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}
        run: |
          CONFIG_FILE="arch/arm64/configs/${{ env.DEFCONFIG_NAME }}"
          echo "CONFIG_LOCALVERSION=\"${{ env.LOCAL_VERSION }}-${{ env.BUILD_TIME }}\"" >> "$CONFIG_FILE"
          echo "CONFIG_LOCALVERSION_AUTO=n" >> "$CONFIG_FILE"
          apply_patch() {
            local url="$1"
            local file=$(basename "$url")
            curl -L -o "$file" "$url"
            patch -p1 < "$file" || echo "::warning::Hunks failed in $file"
            rm -f "$file"
          }
          for p in "https://raw.githubusercontent.com/topnotchfreaks/kernel_patches/main/0001-gki-fixup.patch" "https://raw.githubusercontent.com/topnotchfreaks/kernel_patches/main/0001-scripts-sign-builds.patch" "https://raw.githubusercontent.com/topnotchfreaks/kernel_patches/main/0001-scripts-Don-t-append-and-dirty-to-localversion.patch" "https://raw.githubusercontent.com/topnotchfreaks/kernel_patches/main/0001-scripts-do-not-ship-full-auto_localversion.patch"; do
            apply_patch "$p"
          done

      - name: "🔧 Add BBG Support"
        working-directory: ./${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}
        run: |
          wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
          echo "CONFIG_BBG=y" >> arch/arm64/configs/${{ env.DEFCONFIG_NAME }}
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig

      - name: "🔧 Setup Wild-KSU with SUSFS"
        working-directory: ./${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}
        run: |
          set -e
          rm -rf ./KernelSU ./drivers/kernelsu ./Wild_KSU
          curl -LSs "https://raw.githubusercontent.com/WildKernels/Wild_KSU/wild/kernel/setup.sh" | bash -s canary
          if [ ! -d "Wild_KSU" ]; then exit 1; fi
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android13-5.15
          patch -p1 --forward < susfs4ksu/kernel_patches/50_add_susfs_in_gki-android13-5.15.patch || true
          mkdir -p fs include/linux
          cp -f susfs4ksu/kernel_patches/fs/susfs.c fs/susfs.c
          cp -f susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/susfs.h
          cp -rf susfs4ksu/kernel_patches/KernelSU/kernel/* Wild_KSU/kernel/ || true
          sed -i '/#include <linux\/fs\.h>/a #include <linux/susfs.h>' Wild_KSU/kernel/ksu.c
          sed -i '/ksu_core_init();/a \\tsusfs_init();' Wild_KSU/kernel/ksu.c || true
          [ ! -L "drivers/kernelsu" ] && ln -sf ../Wild_KSU drivers/kernelsu
          cat >> arch/arm64/configs/${{ env.DEFCONFIG_NAME }} << 'EOF'
          CONFIG_KSU=y
          CONFIG_KPROBES=y
          CONFIG_OVERLAY_FS=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          EOF
          rm -rf susfs4ksu

      - name: "⚙️ Setup basic configs"
        working-directory: ${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}
        run: |
          cat >> arch/arm64/configs/${{ env.DEFCONFIG_NAME }} << 'EOF'
          CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_DEFAULT_WESTWOOD=y
          CONFIG_KALLSYMS=y
          EOF

      - name: "📝 Append custom Makefile line"
        working-directory: ${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}
        run: |
          echo 'KBUILD_CFLAGS += -Wno-implicit-function-declaration' >> Makefile

      - name: "🔨 Build kernel"
        working-directory: ${{ env.WORK_DIR }}
        run: |
          LTO=full BUILD_CONFIG=${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}/build.config.gki.aarch64 build/build.sh -j$(nproc --all)

      - name: "📁 Copy kernel image"
        working-directory: ${{ env.WORK_DIR }}/out/dist
        run: |
          cp Image "${{ env.OUTPUT_NAME }}"

      - name: "📦 Package into AnyKernel3 ZIP"
        working-directory: ${{ env.WORK_DIR }}
        run: |
          git clone --depth=1 https://github.com/topnotchfreaks/AnyKernel3 -b YASK AnyKernel3
          cp out/dist/${{ env.OUTPUT_NAME }} AnyKernel3/Image
          cd AnyKernel3
          zip -r9 "../YASK-GKI-Secret_$(date +'%Y-%m-%d').zip" * -x .git/*

      - name: "📤 Upload flashable ZIP"
        uses: actions/upload-artifact@v4
        with:
          name: YASK-GKI-Secret-AK3
          path: "*.zip"
          retention-days: 7
