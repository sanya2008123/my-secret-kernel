          Installing YASK Kernel...
          EOF

          # Create ZIP
          ZIP_NAME="Anykernel3_YASK-WildKSU-AIO-FULL_$(date +'%Y-%m-%d').zip"
          cd AnyKernel3
          zip -r9 "../$ZIP_NAME" * -x .git/*
          cd ..
          
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "вң… Package created: $ZIP_NAME"

      - name: "рҹ“Ө Upload flashable ZIP artifact"
        uses: actions/upload-artifact@v4
        with:
          name: YASK-Flashable-ZIP
          path: ${{ env.ZIP_NAME }}
          retention-days: 7

      - name: "в¬ҶпёҸ Upload to GitHub Release"
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          files: ${{ env.ZIP_NAME }}
          tag_name: "YASK-NEXT"

      - name: "рҹ“ұ Send Telegram Notification"
        run: |
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/YASK-NEXT"
          BANNER_URL="https://raw.githubusercontent.com/topnotchfreaks/kernel_msm-5.15/builder/assets/yask.png"

          if [[ "${{ job.status }}" == "success" ]]; then
            MESSAGE="вң… *YASK Kernel Released*

          рҹ“Ұ *Build Information:*
          вҖў Kernel: \`Linux 5.15\`
          вҖў Android: \`13-16\`
          вҖў Base: \`GKI & CLO\`
          вҖў KSU: \`Wild KSU (canary)\`
          вҖў SUSFS: \`Enabled (GKI A13-5.15)\`
          вҖў LTO: \`Full\`
          вҖў Optimization: \`-O2\`
          вҖў BBG: \`Enabled\`

          рҹ“ұ *Supported Devices:*
          вҖў Redmi Note 12 4G/NFC
          вҖў Redmi Note 13 4G/NFC
          вҖў Redmi Pad SE

          рҹ“ұ *Supported Manager:*
          вҖў KSU by tiann
          вҖў KSU by sidex15
          вҖў Wild-KSU
          вҖў KernelSU-Next
          вҖў Rissu-KSU
          вҖў KowSU

          рҹ•җ *Build Date:* $(date '+%Y-%m-%d %H:%M:%S UTC')
          рҹ“Ұ *Package:* \`${{ env.ZIP_NAME }}\`

          в¬ҮпёҸ [Download Here]($RELEASE_URL)"

            curl -s -X POST \
              -d chat_id=${{ secrets.TELEGRAM_CHANNEL_ID }} \
              -d photo="${BANNER_URL}" \
              --data-urlencode "caption=${MESSAGE}" \
              -d parse_mode="Markdown" \
              -d disable_web_page_preview="false" \
              "https://api.telegram.org/bot${{ secrets.TELEGRAM_YASK_BOT_TOKEN }}/sendPhoto"

          else
            FAILURE_MSG="вқҢ *YASK Kernel Build Failed*
            
          рҹ“Ұ *Build Information:*
          вҖў Kernel: \`Linux 5.15\`
          вҖў Android: \`13-16\`
          вҖў Base: \`GKI & CLO\`
          вҖў KSU: \`Wild KSU (canary)\`
          вҖў SUSFS: \`Enabled (GKI A13-5.15)\`
          вҖў LTO: \`Full\`
          вҖў Optimization: \`-O2\`
          вҖў BBG: \`Enabled\`
          
          рҹ•җ *Failed at:* $(date '+%Y-%m-%d %H:%M:%S UTC')

          рҹ”Қ Check the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
           
            curl -s -X POST \
              -d chat_id=${{ secrets.TELEGRAM_CHANNEL_ID }} \
              -d photo="${BANNER_URL}" \
              --data-urlencode "caption=${FAILURE_MSG}" \
              -d parse_mode="Markdown" \
              "https://api.telegram.org/bot${{ secrets.TELEGRAM_YASK_BOT_TOKEN }}/sendPhoto"
          fi
