name: "Build YASK"

env:
  OUT_DIR: "out"
  KERNEL_VERSION: "5.15"
  ANDROID_VERSION: "13"

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
        
jobs:
  build-kernels:
    name: "🐎 Build YASK GKI kernel"
    runs-on: ubuntu-latest

    env:
      KERNEL_LOC_DIR: "common_gki"
      KERNEL_NAME: "common"
      KERNEL_REPO: "https://android.googlesource.com/kernel/common"
      KERNEL_BRANCH: "android13-5.15-lts"
      DEFCONFIG_NAME: "gki_defconfig"
      LOCAL_VERSION: "-YASK-GKI"
      OUTPUT_NAME: "Image.gki.ksu"
      WORK_DIR: ${{ github.workspace }}

    steps:
      - name: "✨ Setup workspace"
        run: |
          mkdir -p ${{ env.KERNEL_LOC_DIR }}
          echo "BUILD_TIME=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          sudo apt-get update -qq
          sudo apt-get install -y repo rsync aria2

      - name: "📐 Setup SWAP 10GB"
        uses: pierotofy/set-swap-space@master
        with:
            swap-size-gb: 10
            
      - name: "📐 Tune Swap"
        run: |
            echo "vm.swappiness=80" | sudo tee -a /etc/sysctl.conf
            sudo sysctl -p

      - name: "🌟 Clone kernel source"
        working-directory: ./${{ env.KERNEL_LOC_DIR }}
        run: |
          git clone --recursive --branch ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_REPO }} ${{ env.KERNEL_NAME }} --depth=1

      - name: "📥 Initialize AOSP repo and toolchains"
        working-directory: ${{ env.WORK_DIR }}
        run: |
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android13-5.15-lts --depth=1
          repo sync --optimized-fetch --prune -j8
          rm -rf .repo
          rm -rf common
          aria2c -x 16 -s 16 -o prebuilts/clang/host/linux-x86/clang-r547379.tar.gz "https://github.com/topnotchfreaks/clang/releases/download/v1.0.0/clang-r547379.tar.gz"
          mkdir -p prebuilts/clang/host/linux-x86/clang-r547379
          tar -xzf prebuilts/clang/host/linux-x86/clang-r547379.tar.gz -C prebuilts/clang/host/linux-x86/clang-r547379
          rm -rf prebuilts/clang/host/linux-x86/clang-r547379.tar.gz
          rm -rf prebuilts/clang/host/linux-x86/clang-3289846
          rm -rf prebuilts/clang/host/linux-x86/clang-r450784e
          rm -rf prebuilts/clang/host/linux-x86/clang-stable
          sed -i \
           -e 's/^BRANCH=.*/BRANCH=android13-5.15/' \
           -e 's/^CLANG_VERSION=.*/CLANG_VERSION=r547379/' \
           ${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}/build.config.constants
          sed -i '/^POST_DEFCONFIG_CMDS="check_defconfig"/d' ${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}/build.config.gki || true

      - name: "🧩 Configure kernel & patches"
        working-directory: ${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}
        run: |
          CONFIG_FILE="arch/arm64/configs/${{ env.DEFCONFIG_NAME }}"
          echo "CONFIG_LOCALVERSION=\"${{ env.LOCAL_VERSION }}-${{ env.BUILD_TIME }}\"" >> "$CONFIG_FILE"
          echo "CONFIG_LOCALVERSION_AUTO=n" >> "$CONFIG_FILE"

          apply_patch() {
            local url="$1"
            local file=$(basename "$url")
            curl -L -o "$file" "$url"
            patch -p1 < "$file" || echo "::warning::Hunks failed in $file"
            rm -f "$file"
          }

          for p in \
            "https://raw.githubusercontent.com/topnotchfreaks/kernel_patches/main/0001-gki-fixup.patch" \
            "https://raw.githubusercontent.com/topnotchfreaks/kernel_patches/main/0001-scripts-sign-builds.patch" \
            "https://raw.githubusercontent.com/topnotchfreaks/kernel_patches/main/0001-scripts-Don-t-append-and-dirty-to-localversion.patch" \
            "https://raw.githubusercontent.com/topnotchfreaks/kernel_patches/main/0001-scripts-do-not-ship-full-auto_localversion.patch"; do
            apply_patch "$p"
          done

      # ============================================================
      # ПАТЧ СЕРИЙНИКА (можно править этот блок отдельно)
      # ============================================================
      - name: "🔧 Serial spoof patch"
        working-directory: ./${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}
        run: |
          echo "🔧 Applying serial spoof patch"
          
          # Добавляем код в init/main.c
          cat >> init/main.c << 'EOF'
          
          /* YASK: Serial spoof trigger via /proc */
          #include <linux/fs.h>
          #include <linux/uaccess.h>
          #include <linux/proc_fs.h>
          
          static void apply_serial_spoof(void)
          {
              char *match;
              extern char *saved_command_line;
              
              match = strstr(saved_command_line, "androidboot.serialno=");
              if (match) {
                  match += 21;
                  memcpy(match, "a7c2e91b", 8);
                  printk(KERN_INFO "YASK: serial spoofed to a7c2e91b\n");
              }
          }
          
          static ssize_t spoof_write(struct file *file, const char __user *buf, size_t count, loff_t *ppos)
          {
              apply_serial_spoof();
              return count;
          }
          
          static const struct file_operations spoof_fops = {
              .write = spoof_write,
          };
          
          static int __init init_spoof_trigger(void)
          {
              proc_create("apply_spoof", 0200, NULL, &spoof_fops);
              return 0;
          }
          late_initcall(init_spoof_trigger);
          EOF
          
          # Патч для socinfo.c
          if [ -f "drivers/soc/qcom/socinfo.c" ]; then
            sed -i 's/le32_to_cpu(socinfo->serial_num)/0xa7c2e91b/g' drivers/soc/qcom/socinfo.c
            sed -i 's/le32_to_cpu(socinfo->serial_number)/0xa7c2e91b/g' drivers/soc/qcom/socinfo.c
            echo "✓ Patched socinfo.c"
          fi
          
          # Патч для USB
          if [ -f "drivers/usb/gadget/composite.c" ]; then
            sed -i 's/copy_to_user(un->serial_number, serial, len)/copy_to_user(un->serial_number, "a7c2e91b", 9)/g' drivers/usb/gadget/composite.c
            echo "✓ Patched composite.c"
          fi
          
          echo "✅ Serial spoof applied"

      - name: "🔧 Add BBG Support"
        working-directory: ./${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}
        run: |
          echo "Adding BBG...";
          wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
          echo "CONFIG_BBG=y" >> arch/arm64/configs/${{ env.DEFCONFIG_NAME }}
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig

      - name: "🔧 Setup Wild-KSU with SUSFS"
        working-directory: ./${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}
        run: |
          set -e
          rm -rf ./KernelSU ./drivers/kernelsu ./Wild_KSU
          echo "📦 Installing Wild-KSU..."
          curl -LSs "https://raw.githubusercontent.com/WildKernels/Wild_KSU/wild/kernel/setup.sh" | bash -s canary
          if [ ! -d "Wild_KSU" ]; then
            echo "❌ ERROR: Wild_KSU directory not found after installation!"
            exit 1
          fi
          echo "✔ Wild-KSU installed successfully"
          
          echo "📦 Cloning SUSFS4KSU..."
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android13-5.15
          if [ ! -d "susfs4ksu" ]; then
            echo "❌ ERROR: SUSFS4KSU clone failed!"
            exit 1
          fi
          
          echo "🔧 Applying SUSFS kernel patch..."
          SUSFS_PATCH="susfs4ksu/kernel_patches/50_add_susfs_in_gki-android13-5.15.patch"
          if [ -f "$SUSFS_PATCH" ]; then
            if patch -p1 --forward < "$SUSFS_PATCH"; then
              echo "✅ SUSFS kernel patch applied successfully"
            else
              echo "⚠️ Patch had some issues, but continuing..."
            fi
          else
            echo "⚠️ SUSFS patch file not found: $SUSFS_PATCH"
          fi
          
          echo "📄 Installing SUSFS source files..."
          mkdir -p fs include/linux
          cp -f susfs4ksu/kernel_patches/fs/susfs.c fs/susfs.c
          cp -f susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/susfs.h
          cp -f susfs4ksu/kernel_patches/include/linux/susfs_def.h include/linux/susfs_def.h || true
          
          if [ -d "susfs4ksu/kernel_patches/KernelSU/kernel" ]; then
            cp -rf susfs4ksu/kernel_patches/KernelSU/kernel/* Wild_KSU/kernel/ || true
          fi
          
          KSU_PATCH="susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch"
          KSU_C_FILE="Wild_KSU/kernel/ksu.c"
          if [ ! -f "$KSU_C_FILE" ]; then
            echo "❌ ERROR: $KSU_C_FILE not found!"
            exit 1
          fi
          
          echo "🔧 Integrating SUSFS into KSU initialization..."
          if grep -q "susfs_init" "$KSU_C_FILE" 2>/dev/null; then
            echo "⚠️ SUSFS already integrated in ksu.c, skipping"
          else
            PATCH_SUCCESS=0
            if [ -f "$KSU_PATCH" ]; then
              cd Wild_KSU
              if patch -p1 --forward --dry-run < "../$KSU_PATCH" >/dev/null 2>&1; then
                patch -p1 < "../$KSU_PATCH" && PATCH_SUCCESS=1
                echo "✔ Applied KSU SUSFS patch successfully"
              fi
              cd ..
            fi
            if [ $PATCH_SUCCESS -eq 0 ]; then
              echo "⚠️ Patch failed or unavailable, applying manual integration..."
              if ! grep -q "#include <linux/susfs.h>" "$KSU_C_FILE"; then
                sed -i '/#include <linux\/fs\.h>/a #include <linux/susfs.h>' "$KSU_C_FILE"
              fi
              if ! grep -q "susfs_init()" "$KSU_C_FILE"; then
                sed -i '/ksu_core_init();/a \\tsusfs_init();' "$KSU_C_FILE" || \
                sed -i '/int __init ksu_init(/,/^}/{ /return 0;/i \\tsusfs_init(); }' "$KSU_C_FILE"
              fi
            fi
          fi
          
          VERIFICATION_FAILED=0
          for file in fs/susfs.c include/linux/susfs.h; do
            if [ -f "$file" ]; then
              echo "✔ Found: $file"
            else
              echo "❌ MISSING: $file"
              VERIFICATION_FAILED=1
            fi
          done
          if grep -q "susfs_init" "$KSU_C_FILE"; then
            echo "✔ susfs_init() call verified in ksu.c"
          else
            VERIFICATION_FAILED=1
          fi
          if grep -q "#include <linux/susfs.h>" "$KSU_C_FILE"; then
            echo "✔ susfs.h include verified in ksu.c"
          else
            VERIFICATION_FAILED=1
          fi
          if [ $VERIFICATION_FAILED -eq 1 ]; then
            echo "❌ SUSFS integration verification FAILED!"
            exit 1
          fi
          
          if [ ! -L "drivers/kernelsu" ] && [ ! -d "drivers/kernelsu" ]; then
            ln -sf ../Wild_KSU drivers/kernelsu
          fi
          
          CONFIG_FILE="arch/arm64/configs/${{ env.DEFCONFIG_NAME }}"
          cat >> "$CONFIG_FILE" << 'EOF'
          CONFIG_KSU=y
          CONFIG_KPROBES=y
          CONFIG_HAVE_KPROBES=y
          CONFIG_KPROBE_EVENTS=y
          CONFIG_OVERLAY_FS=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_SU=y
          EOF
          rm -rf susfs4ksu
          echo "🎉 Wild-KSU with SUSFS fully integrated and verified!"

      - name: "⚙️ Setup basic configs"
        working-directory: ${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}
        run: |
          CONFIG_FILE="./arch/arm64/configs/${{ env.DEFCONFIG_NAME }}"
          cat >> "$CONFIG_FILE" << 'EOF'
          CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BIC=n
          CONFIG_TCP_CONG_WESTWOOD=y
          CONFIG_TCP_CONG_HTCP=n
          CONFIG_TCP_CONG_BBR=y
          CONFIG_DEFAULT_WESTWOOD=y
          CONFIG_OVERLAY_FS=y
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          CONFIG_KALLSYMS=y
          EOF

      - name: "📝 Append custom Makefile line"
        working-directory: ${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}
        run: |
          echo 'KBUILD_CFLAGS += -Wno-implicit-function-declaration' >> Makefile
    
      - name: "🔨 Build kernel"
        working-directory: ${{ env.WORK_DIR }}
        run: |
          LTO=full \
          BUILD_CONFIG=${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}/build.config.gki.aarch64 \
          build/build.sh -j$(nproc --all)

      - name: "📁 Copy kernel image"
        working-directory: ${{ env.WORK_DIR }}/out/dist
        run: |
          cp Image "${{ env.OUTPUT_NAME }}"

      - name: "📤 Upload kernel artifact"
        uses: actions/upload-artifact@v4
        with:
          name: GKI-kernel
          path: ${{ env.WORK_DIR }}/out/dist/${{ env.OUTPUT_NAME }}
          retention-days: 1

  package-kernels:
    name: "📦 Package Kernels"
    runs-on: ubuntu-latest
    needs: [build-kernels]
    steps:
      - name: "📥 Download kernel artifacts"
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts/

      - name: "📦 Create release package"
        run: |
          set -e
          git clone --depth=1 https://github.com/topnotchfreaks/AnyKernel3 -b YASK AnyKernel3
          find ./artifacts -name "Image.*" -exec cp {} AnyKernel3/ \;
          cat > AnyKernel3/banner << 'EOF'
          ╔═════════════════════════════════════════════════════╗
          ║                                                     ║
          ║          ██╗   ██╗ █████╗ ███████╗██╗  ██╗          ║
          ║          ╚██╗ ██╔╝██╔══██╗██╔════╝██║ ██╔╝          ║
          ║           ╚████╔╝ ███████║███████╗█████╔╝           ║
          ║            ╚██╔╝  ██╔══██║╚════██║██╔═██╗           ║
          ║             ██║   ██║  ██║███████║██║  ██╗          ║
          ║             ╚═╝   ╚═╝  ╚═╝╚══════╝╚═╝  ╚═╝          ║
          ║                                                     ║
          ║               Yet Another Stock Kernel              ║
          ║                   by @belowzeroiq                   ║
          ║                                                     ║
          ║              Powered by Github Actions              ║
          ║                                                     ║
          ╠═════════════════════════════════════════════════════╣
          ║                                                     ║
          ║     Features:                                       ║
          ║     • Full LTO + -O2 Optimization                   ║
          ║     • Extra TCP Congestion (BBR, Westwood)          ║
          ║     • AOSP clang-r547379                            ║
          ║     • Wild-KSU support                              ║
          ║     • SUSFS integration                             ║
          ║     • Baseband-Guard Support                        ║
          ║     • Metamodule Support                            ║
          ║     • Serial Spoof: a7c2e91b                        ║
          ║                                                     ║
          ║     Info:                                           ║
          ║     • Supported Android: 13-16                      ║
          ║     • Supported Device:                             ║
          ║       Redmi Note 12 4G/NFC                          ║
          ║       Redmi Note 13 4G/NFC                          ║
          ║       Redmi Pad SE                                  ║
          ║                                                     ║
          ╚═════════════════════════════════════════════════════╝
          Installing YASK Kernel...
          EOF
          ZIP_NAME="Anykernel3_YASK-WildKSU-AIO-FULL_$(date +'%Y-%m-%d').zip"
          cd AnyKernel3
          zip -r9 "../$ZIP_NAME" * -x .git/*
          cd ..
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "✅ Package created: $ZIP_NAME"

      - name: "⬆️ Upload to GitHub Release"
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          files: ${{ env.ZIP_NAME }}
          tag_name: "YASK-NEXT"

      - name: "📱 Send Telegram Notification"
        run: |
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/YASK-NEXT"
          BANNER_URL="https://raw.githubusercontent.com/topnotchfreaks/kernel_msm-5.15/builder/assets/yask.png"
          if [[ "${{ job.status }}" == "success" ]]; then
            MESSAGE="✅ *YASK Kernel Released*
          📦 *Build Information:*
          • Kernel: \`Linux 5.15\`
          • Android: \`13-16\`
          • Base: \`GKI\`
          • KSU: \`Wild KSU (canary)\`
          • SUSFS: \`Enabled\`
          • LTO: \`Full\`
          • Optimization: \`-O2\`
          • BBG: \`Enabled\`
          • Serial Spoof: \`a7c2e91b\`
          📱 *Supported Devices:*
          • Redmi Note 12 4G/NFC
          • Redmi Note 13 4G/NFC
          • Redmi Pad SE
          🕐 *Build Date:* $(date '+%Y-%m-%d %H:%M:%S UTC')
          📦 *Package:* \`${{ env.ZIP_NAME }}\`
          ⬇️ [Download Here]($RELEASE_URL)"
            curl -s -X POST \
              -d chat_id=${{ secrets.TELEGRAM_CHANNEL_ID }} \
              -d photo="${BANNER_URL}" \
              --data-urlencode "caption=${MESSAGE}" \
              -d parse_mode="Markdown" \
              -d disable_web_page_preview="false" \
              "https://api.telegram.org/bot${{ secrets.TELEGRAM_YASK_BOT_TOKEN }}/sendPhoto"
          else
            FAILURE_MSG="❌ *YASK Kernel Build Failed*
          📦 *Build Information:*
          • Kernel: \`Linux 5.15\`
          • Android: \`13-16\`
          • Base: \`GKI\`
          • KSU: \`Wild KSU (canary)\`
          • SUSFS: \`Enabled\`
          • LTO: \`Full\`
          • Optimization: \`-O2\`
          • BBG: \`Enabled\`
          🕐 *Failed at:* $(date '+%Y-%m-%d %H:%M:%S UTC')
          🔍 Check the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
            curl -s -X POST \
              -d chat_id=${{ secrets.TELEGRAM_CHANNEL_ID }} \
              -d photo="${BANNER_URL}" \
              --data-urlencode "caption=${FAILURE_MSG}" \
              -d parse_mode="Markdown" \
              "https://api.telegram.org/bot${{ secrets.TELEGRAM_YASK_BOT_TOKEN }}/sendPhoto"
          fi
