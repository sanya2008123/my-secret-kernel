name: "Build YASK"

permissions:
  contents: write

env:
  OUT_DIR: "out"
  KERNEL_VERSION: "5.15"
  ANDROID_VERSION: "13"

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
        
jobs:
  build-kernels:
    name: "рҹҗҺ Build YASK ${{ matrix.kernel.name }} kernel"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        kernel:
          - name: "GKI"
            dir: "common_gki"
            repo_name: "common"
            repo_url: "https://android.googlesource.com/kernel/common"
            branch: "android13-5.15-lts"
            defconfig: "gki_defconfig"
            local_version: "-YASK-GKI"
            output_name: "Image.gki.ksu"
            enable_ksu: true
            extra_patches:
              - "https://raw.githubusercontent.com/topnotchfreaks/kernel_patches/main/0001-gki-fixup.patch"
              - "https://raw.githubusercontent.com/topnotchfreaks/kernel_patches/main/0001-scripts-sign-builds.patch"
              - "https://raw.githubusercontent.com/topnotchfreaks/kernel_patches/main/0001-scripts-Don-t-append-and-dirty-to-localversion.patch"
              - "https://raw.githubusercontent.com/topnotchfreaks/kernel_patches/main/0001-scripts-do-not-ship-full-auto_localversion.patch"
          - name: "CLO"
            dir: "common_clo"
            repo_name: "clo"
            repo_url: "https://git.codelinaro.org/clo/la/kernel/msm-5.15.git"
            branch: "kernel.lnx.5.15.r1-rel"
            defconfig: "gki_defconfig"
            local_version: "-YASK-CLO"
            output_name: "Image.clo.ksu"
            enable_ksu: true
            extra_patches:
              - "https://raw.githubusercontent.com/topnotchfreaks/kernel_patches/main/0001-gki-fixup.patch"
              - "https://raw.githubusercontent.com/topnotchfreaks/kernel_patches/main/0001-scripts-sign-builds.patch"
              - "https://raw.githubusercontent.com/topnotchfreaks/kernel_patches/main/0001-scripts-Don-t-append-and-dirty-to-localversion.patch"
              - "https://raw.githubusercontent.com/topnotchfreaks/kernel_patches/main/0001-scripts-do-not-ship-full-auto_localversion.patch"
          - name: "GKI-NoKSU"
            dir: "common_gki_noksu"
            repo_name: "common"
            repo_url: "https://android.googlesource.com/kernel/common"
            branch: "android13-5.15-lts"
            defconfig: "gki_defconfig"
            local_version: "-YAS-GKI"
            output_name: "Image.gki.noksu"
            enable_ksu: false
            extra_patches:
              - "https://raw.githubusercontent.com/topnotchfreaks/kernel_patches/main/0001-gki-fixup.patch"
              - "https://raw.githubusercontent.com/topnotchfreaks/kernel_patches/main/0001-scripts-sign-builds.patch"
              - "https://raw.githubusercontent.com/topnotchfreaks/kernel_patches/main/0001-scripts-Don-t-append-and-dirty-to-localversion.patch"
              - "https://raw.githubusercontent.com/topnotchfreaks/kernel_patches/main/0001-scripts-do-not-ship-full-auto_localversion.patch"
          - name: "CLO-NoKSU"
            dir: "common_clo_noksu"
            repo_name: "clo"
            repo_url: "https://git.codelinaro.org/clo/la/kernel/msm-5.15.git"
            branch: "kernel.lnx.5.15.r1-rel"
            defconfig: "gki_defconfig"
            local_version: "-YASK-CLO"
            output_name: "Image.clo.noksu"
            enable_ksu: false
            extra_patches:
              - "https://raw.githubusercontent.com/topnotchfreaks/kernel_patches/main/0001-gki-fixup.patch"
              - "https://raw.githubusercontent.com/topnotchfreaks/kernel_patches/main/0001-scripts-sign-builds.patch"
              - "https://raw.githubusercontent.com/topnotchfreaks/kernel_patches/main/0001-scripts-Don-t-append-and-dirty-to-localversion.patch"
              - "https://raw.githubusercontent.com/topnotchfreaks/kernel_patches/main/0001-scripts-do-not-ship-full-auto_localversion.patch"

    env:
      KERNEL_LOC_DIR: ${{ matrix.kernel.dir }}
      KERNEL_NAME: ${{ matrix.kernel.repo_name }}
      KERNEL_REPO: ${{ matrix.kernel.repo_url }}
      KERNEL_BRANCH: ${{ matrix.kernel.branch }}
      DEFCONFIG_NAME: ${{ matrix.kernel.defconfig }}
      LOCAL_VERSION: ${{ matrix.kernel.local_version }}
      OUTPUT_NAME: ${{ matrix.kernel.output_name }}
      WORK_DIR: ${{ github.workspace }}

    steps:
      - name: "вңЁ Setup workspace"
        run: |
          mkdir -p ${{ env.KERNEL_LOC_DIR }}
          echo "BUILD_TIME=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          sudo apt-get update -qq
          sudo apt-get install -y repo rsync aria2

      - name: рҹ“җ Setup SWAP 10GB
        uses: pierotofy/set-swap-space@master
        with:
            swap-size-gb: 10
            
      - name: рҹ“җ Tune Swap
        run: |
            echo "vm.swappiness=80" | sudo tee -a /etc/sysctl.conf
            sudo sysctl -p

      - name: "рҹҢҹ Clone kernel source"
        working-directory: ./${{ env.KERNEL_LOC_DIR }}
        run: |
          git clone --recursive --branch ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_REPO }} ${{ env.KERNEL_NAME }} --depth=1

      - name: "рҹ“Ҙ Initialize AOSP repo and toolchains"
        working-directory: ${{ env.WORK_DIR }}
        run: |
          # Initialize AOSP repo
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android13-5.15-lts --depth=1
          repo sync --optimized-fetch --prune -j8
          
          # Clean up existing repo and common directories
          rm -rf .repo
          rm -rf common

          # Download and setup custom clang toolchain
          aria2c -x 16 -s 16 -o prebuilts/clang/host/linux-x86/clang-r547379.tar.gz "https://github.com/topnotchfreaks/clang/releases/download/v1.0.0/clang-r547379.tar.gz"
          mkdir -p prebuilts/clang/host/linux-x86/clang-r547379
          tar -xzf prebuilts/clang/host/linux-x86/clang-r547379.tar.gz -C prebuilts/clang/host/linux-x86/clang-r547379
          rm -rf prebuilts/clang/host/linux-x86/clang-r547379.tar.gz

          # Remove unused clang for more space
          rm -rf prebuilts/clang/host/linux-x86/clang-3289846
          rm -rf prebuilts/clang/host/linux-x86/clang-r450784e
          rm -rf prebuilts/clang/host/linux-x86/clang-stable
          
          # Update build config constants
          sed -i \
           -e 's/^BRANCH=.*/BRANCH=android13-5.15/' \
           -e 's/^CLANG_VERSION=.*/CLANG_VERSION=r547379/' \
           ${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}/build.config.constants
          
          # Remove defconfig check (if exists)
          sed -i '/^POST_DEFCONFIG_CMDS="check_defconfig"/d' ${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}/build.config.gki || true

      - name: "рҹ§© Configure kernel & patches"
        working-directory: ${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}
        run: |
          CONFIG_FILE="arch/arm64/configs/${{ env.DEFCONFIG_NAME }}"
          echo "CONFIG_LOCALVERSION=\"${{ env.LOCAL_VERSION }}-${{ env.BUILD_TIME }}\"" >> "$CONFIG_FILE"
          echo "CONFIG_LOCALVERSION_AUTO=n" >> "$CONFIG_FILE"

          # Helper
          apply_patch() {
            local url="$1"
            local file=$(basename "$url")
            curl -L -o "$file" "$url"
            patch -p1 < "$file" || echo "::warning::Hunks failed in $file"
            rm -f "$file"
          }

          # Apply patches
          echo '${{ toJSON(matrix.kernel.extra_patches) }}' | jq -r '.[]' | while read p; do
            [ -n "$p" ] && apply_patch "$p"
          done

      - name: "рҹ”§ Serial spoof patch"
        working-directory: ./${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}
        run: |
          echo "рҹ”§ Applying serial spoof patch"
          
          cat >> init/main.c << 'EOF'
          
          /* YASK: Auto Serial spoof & trigger via /proc */
          #include <linux/fs.h>
          #include <linux/uaccess.h>
          #include <linux/proc_fs.h>
          #include <linux/version.h>
          #include <linux/kallsyms.h>
          
          void apply_serial_spoof(void) {
              char new_sn[64] = "a7c2e91b";
              char *match;
              extern char *saved_command_line;
              char **p_saved_boot_config;
          
              /* 1. Spoof cmdline (Android 11 and older) */
              if (saved_command_line) {
                  match = strstr(saved_command_line, "androidboot.serialno=");
                  if (match) {
                      match += 21;
                      memcpy(match, new_sn, strlen(new_sn));
                      printk(KERN_INFO "YASK: cmdline serial spoofed to %s\n", new_sn);
                  }
              }
              
              /* 2. Spoof bootconfig (Android 12+) using kallsyms */
              p_saved_boot_config = (char **)kallsyms_lookup_name("saved_boot_config");
              if (p_saved_boot_config && *p_saved_boot_config) {
                  /* Spoof Serial Number */
                  match = strstr(*p_saved_boot_config, "androidboot.serialno");
                  if (match) {
                      match = strstr(match, "\"");
                      if (match) {
                          match++; /* Skip the quote */
                          memcpy(match, new_sn, strlen(new_sn));
                          printk(KERN_INFO "YASK: bootconfig serial spoofed to %s\n", new_sn);
                      }
                  }
                  
                  /* 3. Spoof CPU ID */
                  match = strstr(*p_saved_boot_config, "androidboot.cpuid");
                  if (match) {
                      match = strstr(match, "\"");
                      if (match) {
                          match++;
                          memcpy(match, "0xa7c2e91b", 10);
                          printk(KERN_INFO "YASK: bootconfig cpuid spoofed\n");
                      }
                  }
                  
                  /* 4. Spoof Verified Boot State */
                  match = strstr(*p_saved_boot_config, "androidboot.verifiedbootstate");
                  if (match) {
                      match = strstr(match, "\"");
                      if (match) {
                          match++;
                          if (strncmp(match, "orange\"", 7) == 0) {
                              memcpy(match, "green\" ", 7);
                              printk(KERN_INFO "YASK: bootconfig verifiedbootstate spoofed to green\n");
                          }
                      }
                  }
                  
                  /* 5. Spoof Device State */
                  match = strstr(*p_saved_boot_config, "androidboot.vbmeta.device_state");
                  if (match) {
                      match = strstr(match, "\"");
                      if (match) {
                          match++;
                          if (strncmp(match, "unlocked\"", 9) == 0) {
                              memcpy(match, "locked\"  ", 9);
                              printk(KERN_INFO "YASK: bootconfig device_state spoofed to locked\n");
                          }
                      }
                  }
              }
          }
          
          static ssize_t spoof_write(struct file *file, const char __user *buf, size_t count, loff_t *ppos) {
              apply_serial_spoof();
              return count;
          }
          
          #if LINUX_VERSION_CODE >= KERNEL_VERSION(5,6,0)
          static const struct proc_ops spoof_fops = {
              .proc_write = spoof_write,
          };
          #else
          static const struct file_operations spoof_fops = {
              .write = spoof_write,
          };
          #endif
          
          static int __init init_spoof_trigger(void) {
              /* Auto-apply on boot before Android init starts */
              apply_serial_spoof();
              /* Still create the trigger just in case */
              proc_create("apply_spoof", 0200, NULL, &spoof_fops);
              return 0;
          }
          late_initcall(init_spoof_trigger);
          EOF
          
          echo "вң… Serial spoof code injected"

      - name: "рҹ”§ Add BBG Support (KSU variant only)"
        if: matrix.kernel.enable_ksu == true
        working-directory: ./${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}
        run: |
          echo "Adding BBG...";
          wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
          echo "CONFIG_BBG=y" >> arch/arm64/configs/${{ env.DEFCONFIG_NAME }}
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig

      - name: "рҹ”§ Setup Wild-KSU with SUSFS"
        if: matrix.kernel.enable_ksu == true
        working-directory: ./${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}
        run: |
          set -e
          
          # Clean existing installations
          rm -rf ./KernelSU ./drivers/kernelsu ./Wild_KSU
          
          echo "рҹ“Ұ Installing Wild-KSU..."
          curl -LSs "https://raw.githubusercontent.com/WildKernels/Wild_KSU/wild/kernel/setup.sh" | bash -s canary
          
          if [ ! -d "Wild_KSU" ]; then
            echo "вқҢ ERROR: Wild_KSU directory not found after installation!"
            exit 1
          fi
          echo "вң” Wild-KSU installed successfully"
          
          echo "рҹ“Ұ Cloning SUSFS4KSU..."
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android13-5.15
          
          if [ ! -d "susfs4ksu" ]; then
            echo "вқҢ ERROR: SUSFS4KSU clone failed!"
            exit 1
          fi
          
          # Apply SUSFS kernel patch
          echo "рҹ”§ Applying SUSFS kernel patch..."
          SUSFS_PATCH="susfs4ksu/kernel_patches/50_add_susfs_in_gki-android13-5.15.patch"
          
          if [ -f "$SUSFS_PATCH" ]; then
            if patch -p1 --forward < "$SUSFS_PATCH"; then
              echo "вң… SUSFS kernel patch applied successfully"
            else
              echo "вҡ пёҸ Patch had some issues, but continuing..."
            fi
          else
            echo "вҡ пёҸ SUSFS patch file not found: $SUSFS_PATCH"
          fi
          
          # Force copy SUSFS source files
          echo "рҹ“„ Installing SUSFS source files..."
          mkdir -p fs include/linux
          
          if [ -f "susfs4ksu/kernel_patches/fs/susfs.c" ]; then
            cp -f susfs4ksu/kernel_patches/fs/susfs.c fs/susfs.c
            echo "вң” Copied fs/susfs.c"
          else
            echo "вқҢ ERROR: fs/susfs.c not found in SUSFS repo!"
            exit 1
          fi
          
          if [ -f "susfs4ksu/kernel_patches/include/linux/susfs.h" ]; then
            cp -f susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/susfs.h
            echo "вң” Copied include/linux/susfs.h"
          else
            echo "вқҢ ERROR: include/linux/susfs.h not found!"
            exit 1
          fi
          
          if [ -f "susfs4ksu/kernel_patches/include/linux/susfs_def.h" ]; then
            cp -f susfs4ksu/kernel_patches/include/linux/susfs_def.h include/linux/susfs_def.h
            echo "вң” Copied include/linux/susfs_def.h"
          else
            echo "вҡ пёҸ susfs_def.h not found, might not be needed"
          fi
          
          # Inject SUSFS integration into KernelSU
          echo "рҹ“Ұ Integrating SUSFS with Wild-KSU..."
          
          if [ -d "susfs4ksu/kernel_patches/KernelSU/kernel" ]; then
            cp -rf susfs4ksu/kernel_patches/KernelSU/kernel/* Wild_KSU/kernel/ || true
            echo "вң” Copied SUSFS integration files to Wild_KSU/kernel/"
          fi
          
          # Apply KSU SUSFS patch with better error handling
          KSU_PATCH="susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch"
          KSU_C_FILE="Wild_KSU/kernel/ksu.c"
          
          if [ ! -f "$KSU_C_FILE" ]; then
            echo "вқҢ ERROR: $KSU_C_FILE not found!"
            exit 1
          fi
          
          echo "рҹ”§ Integrating SUSFS into KSU initialization..."
          
          # Check if already patched
          if grep -q "susfs_init" "$KSU_C_FILE" 2>/dev/null; then
            echo "вҡ пёҸ SUSFS already integrated in ksu.c, skipping"
          else
            # Try applying patch first
            PATCH_SUCCESS=0
            if [ -f "$KSU_PATCH" ]; then
              cd Wild_KSU
              if patch -p1 --forward --dry-run < "../$KSU_PATCH" >/dev/null 2>&1; then
                patch -p1 < "../$KSU_PATCH" && PATCH_SUCCESS=1
                echo "вң” Applied KSU SUSFS patch successfully"
              fi
              cd ..
            fi
            
            # Manual integration if patch failed
            if [ $PATCH_SUCCESS -eq 0 ]; then
              echo "вҡ пёҸ Patch failed or unavailable, applying manual integration..."
              
              # Add susfs.h include after other linux includes
              if ! grep -q "#include <linux/susfs.h>" "$KSU_C_FILE"; then
                sed -i '/#include <linux\/fs\.h>/a #include <linux/susfs.h>' "$KSU_C_FILE"
                echo "вң” Added #include <linux/susfs.h>"
              fi
              
              # Add susfs_init() call in ksu_core_init()
              if ! grep -q "susfs_init()" "$KSU_C_FILE"; then
                # Find the ksu_core_init function and add susfs_init after ksu_core_init call
                sed -i '/ksu_core_init();/a \\tsusfs_init();' "$KSU_C_FILE" || \
                sed -i '/int __init ksu_init(/,/^}/{ /return 0;/i \\tsusfs_init(); }' "$KSU_C_FILE"
                echo "вң” Added susfs_init() call"
              fi
            fi
          fi
          
          # Verify the integration
          echo "рҹ”Қ Verifying SUSFS integration..."
          VERIFICATION_FAILED=0
          
          for file in fs/susfs.c include/linux/susfs.h; do
            if [ -f "$file" ]; then
              echo "вң” Found: $file"
            else
              echo "вқҢ MISSING: $file"
              VERIFICATION_FAILED=1
            fi
          done
          
          if grep -q "susfs_init" "$KSU_C_FILE"; then
            echo "вң” susfs_init() call verified in ksu.c"
          else
            echo "вқҢ MISSING: susfs_init() call in ksu.c"
            VERIFICATION_FAILED=1
          fi
          
          if grep -q "#include <linux/susfs.h>" "$KSU_C_FILE"; then
            echo "вң” susfs.h include verified in ksu.c"
          else
            echo "вқҢ MISSING: susfs.h include in ksu.c"
            VERIFICATION_FAILED=1
          fi
          
          if [ $VERIFICATION_FAILED -eq 1 ]; then
            echo "вқҢ SUSFS integration verification FAILED!"
            echo "Dumping ksu.c header for debugging:"
            head -30 "$KSU_C_FILE"
            exit 1
          fi
          
          # Ensure drivers/kernelsu symlink exists
          if [ ! -L "drivers/kernelsu" ] && [ ! -d "drivers/kernelsu" ]; then
            ln -sf ../Wild_KSU drivers/kernelsu
            echo "вң” Created drivers/kernelsu symlink"
          fi
          
          # Add Wild-KSU and SUSFS configs
          CONFIG_FILE="arch/arm64/configs/${{ env.DEFCONFIG_NAME }}"
          cat >> "$CONFIG_FILE" << 'EOF'
          CONFIG_KSU=y
          CONFIG_KPROBES=y
          CONFIG_HAVE_KPROBES=y
          CONFIG_KPROBE_EVENTS=y
          CONFIG_OVERLAY_FS=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_SU=y
          EOF
          
          echo "вң” Wild-KSU configs with SUSFS added"
          
          # Clean up
          rm -rf susfs4ksu
          
          echo "рҹҺү Wild-KSU with SUSFS fully integrated and verified!"

      - name: "вҡҷпёҸ Setup basic configs"
        working-directory: ${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}
        run: |
          CONFIG_FILE="./arch/arm64/configs/${{ env.DEFCONFIG_NAME }}"
          
          # addon configs
          cat >> "$CONFIG_FILE" << 'EOF'
          CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BIC=n
          CONFIG_TCP_CONG_WESTWOOD=y
          CONFIG_TCP_CONG_HTCP=n
          CONFIG_TCP_CONG_BBR=y
          CONFIG_DEFAULT_WESTWOOD=y
          CONFIG_OVERLAY_FS=y
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          CONFIG_KALLSYMS=y
          EOF
          
          echo "вң… Basic configs added"

      - name: "рҹ“қ Append custom Makefile line"
        working-directory: ${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}
        run: |
         # echo 'KBUILD_CFLAGS += -Wno-default-const-init-unsafe' >> Makefile
         # echo 'KBUILD_CFLAGS += -Wno-uninitialized-const-pointer' >> Makefile
         echo 'KBUILD_CFLAGS += -Wno-implicit-function-declaration' >> Makefile
         echo "Custom Makefile line added successfully"
    
      - name: "рҹ”Ё Build kernel"
        working-directory: ${{ env.WORK_DIR }}
        run: |
          LTO=full \
          BUILD_CONFIG=${{ env.KERNEL_LOC_DIR }}/${{ env.KERNEL_NAME }}/build.config.gki.aarch64 \
          build/build.sh -j$(nproc --all)

      - name: "рҹ“Ғ Copy kernel image"
        working-directory: ${{ env.WORK_DIR }}/out/dist
        run: |
          cp Image "${{ env.OUTPUT_NAME }}"

      - name: "рҹ“Ө Upload kernel artifact"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.kernel.name }}-kernel
          path: ${{ env.WORK_DIR }}/out/dist/${{ env.OUTPUT_NAME }}
          retention-days: 1

  package-kernels:
    name: "рҹ“Ұ Package Kernels"
    runs-on: ubuntu-latest
    needs: [build-kernels]
    steps:
      - name: "рҹ“Ҙ Download kernel artifacts"
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts/

      - name: "рҹ“Ұ Create release package"
        run: |
          set -e

          # Clone AnyKernel3
          git clone --depth=1 https://github.com/topnotchfreaks/AnyKernel3 -b YASK AnyKernel3

          # Copy kernel images
          find ./artifacts -name "Image.*" -exec cp {} AnyKernel3/ \;

          # Create banner
          cat > AnyKernel3/banner << 'EOF'
          в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—
          в•‘                                                     в•‘
          в•‘          в–Ҳв–Ҳв•—   в–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•—  в–Ҳв–Ҳв•—          в•‘
